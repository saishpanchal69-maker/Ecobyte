{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="page-center">
  <div class="card">
    <h2>Create Account</h2>
    <p>Join the EcoByte System</p>

    <form method="POST">
      {% csrf_token %}

      <input
        type="text"
        name="username"
        placeholder="Username"
        required
      >

      <input
        type="email"
        name="email"
        placeholder="Email"
        required
      >

      <input
        type="password"
        name="password1"
        placeholder="Password"
        required
      >

      <input
        type="password"
        name="password2"
        placeholder="Confirm Password"
        required
      >

      <button class="btn" type="submit">Register</button>
    </form>

    {% if error %}
      <p style="color:red; margin-top:10px;">{{ error }}</p>
    {% endif %}

    <a class="link" href="{% url 'core:login' %}">
      Already registered? Login
    </a>
  </div>
</div>
{% endblock %}
